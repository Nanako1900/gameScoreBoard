name = "gamescoreboard-bn"
main = "worker/index.ts"
compatibility_date = "2025-05-01"

# --- Static assets (built React SPA in ./dist) ---
# run_worker_first = true means the Worker handles every request first; it routes
# /api and /auth itself and delegates everything else to env.ASSETS.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

# --- D1 database ---
# Create with:  wrangler d1 create edg-credit
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "edg-credit"
database_id = "914e6b6a-e965-4bca-ae48-081d23227829"

# --- Weekly credit recovery ---
# Runs lazily + idempotently on the first app load each week (worker/routes.ts →
# GET /api/config, guarded by the weekly_heals primary key), so NO Cron Trigger is
# required and Workers Builds will not fail on the schedules API.
# If you want recovery to fire at an exact time regardless of traffic, add a Cron
# Trigger in the dashboard (Worker → Settings → Triggers → Cron Triggers):
#   "0 16 * * 0"  = Sunday 16:00 UTC = Monday 00:00 Beijing (UTC+8)
# The scheduled() handler in worker/index.ts already handles it if a cron fires.

# --- Non-secret config (safe to commit) ---
# Secrets (OAUTH_CLIENT_SECRET, SESSION_SECRET) must be set via `wrangler secret put`.
# OAUTH_BASE_URL / OAUTH_CLIENT_ID may live here or as secrets; keep real values
# out of git if the repo is public — prefer `wrangler secret put` for production.
[vars]
RESET_TZ_OFFSET = "8"
# APP_URL = "https://your-domain.example"        # optional; else derived from request origin
# ADMIN_USERNAMES = "Nanako1900"                  # comma-separated usernames auto-granted admin
# OAUTH_BASE_URL = "https://auth.example.com"     # Nanako OAuth base URL
# OAUTH_CLIENT_ID = "your-client-id"

# --- Split deployment: frontend on EdgeOne, backend here. See DEPLOY-EDGEONE.md.
# Option A (EdgeOne edge-function reverse-proxy, recommended): set APP_URL to the
# EdgeOne origin so the OAuth redirect_uri points at EdgeOne. Nothing else needed.
# APP_URL = "https://your-app.edgeone.app"
# Option B/C (SPA calls the Worker directly, cross-origin) also set:
# FRONTEND_ORIGIN = "https://your-app.edgeone.app"   # enables credentialed CORS
# FRONTEND_URL   = "https://your-app.edgeone.app"    # /auth/callback returns here
# COOKIE_DOMAIN  = ".example.com"                    # Option B: share cookie across subdomains
# COOKIE_SAMESITE = "None"                           # Option C: cross-site cookie (needs Secure)
